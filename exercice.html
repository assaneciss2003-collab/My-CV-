<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Cours sur les listes ordonnées et non ordonnées en HTML</title>
</head>
<body>
    <ul><li>Assane</li>
        <li>Canila</li>
        <li>Baba</li>
    </ul>
    <ol type="1">
        <li>Assane </li>
        <li>Baba </li>
        <li>Camila</li>
    </ol>
    <dl> 
        <dt>Assane</dt>
        <dd>Assane est un étudiant en informatique.</dd>
        <dt>Baba</dt>
        <dd>Baba est un développeur web expérimenté.</dd>
        <dt>Camila</dt>
        <dd>Camila est une designer graphique talentueuse.</dd>
    </dl>
</body>
</html>
